name: Build Windows App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build Windows app
        run: pyinstaller --noconfirm --windowed --name "DOCX Merger" main.py

      - name: Pack Windows build
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/DOCX Merger" -DestinationPath "dist/DOCX-Merger-windows-x64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DOCX-Merger-windows-x64
          path: dist/DOCX-Merger-windows-x64.zip

      - name: Attach archive to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/DOCX-Merger-windows-x64.zip
